services:
  postgres:
    image: postgres:16
    container_name: bandred-postgres
    environment:
      POSTGRES_DB: bandred_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: America/Guayaquil
    volumes:
      - bandred-postgres-data:/var/lib/postgresql/data
    networks:
      - epmapat-network

  app:
    build: .
    container_name: bandred-app
    ports:
      - "9091:9091"
    environment:
      TZ: America/Guayaquil
      SERVER_PORT: 9091
      DB_URL: jdbc:postgresql://postgres:5432/bandred_db
      DB_USER: postgres
      DB_PASS: postgres
      PAGOSONLINE_API_BASE_URL: http://pagosonline:9092
      ERP_BACKEND_BASE_URL: http://192.168.0.165:9080/fec_factura
    depends_on:
      - postgres
    networks:
      - epmapat-network

volumes:
  bandred-postgres-data:

networks:
  epmapat-network:
    external: true
