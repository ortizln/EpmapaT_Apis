server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: msvc-epmapaapi
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jackson:
    serialization:
      FAIL_ON_EMPTY_BEANS: false #esto sirve para evitar el jsonignore
  jpa:
    database: POSTGRESQL
    #database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate.jdbc.batch_size: 1000
      hibernate.order_inserts: true
      hibernate.order_updates: true
      hibernate.jdbc.fetch_size: 1000
      open-in-view: false
  servlet:
    multipart:
      max-file-size : 10MB
      max-request-size: 10MB

sri:
  datasource:
    url: ${SRI_DB_URL}
    username: ${SRI_DB_USER}
    password: ${SRI_DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5

jwt:
  secret: ${JWT_SECRET:EpmapaT2024ClaveSecretaParaJWTTokenSeguridad}
  expiration: ${JWT_EXPIRATION:86400000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

