services:
  postgres:
    image: postgres:16
    container_name: epmapaapi-postgres
    environment:
      POSTGRES_DB: epmapaapi_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: America/Guayaquil
    volumes:
      - epmapaapi-postgres-data:/var/lib/postgresql/data
    networks:
      - epmapat-network

  app:
    build: .
    container_name: epmapaapi-app
    ports:
      - "9085:9085"
    environment:
      TZ: America/Guayaquil
      SERVER_PORT: 9085
      DB_URL: jdbc:postgresql://postgres:5432/epmapaapi_db
      DB_USER: postgres
      DB_PASS: postgres
    depends_on:
      - postgres
    networks:
      - epmapat-network

volumes:
  epmapaapi-postgres-data:

networks:
  epmapat-network:
    external: true
