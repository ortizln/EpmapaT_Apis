services:
  postgres:
    image: postgres:16
    container_name: sri-postgres
    environment:
      POSTGRES_DB: sri_files_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: America/Guayaquil
    volumes:
      - sri-postgres-data:/var/lib/postgresql/data
    networks:
      - epmapat-network

  app:
    build: .
    container_name: sri-app
    ports:
      - "9090:9090"
    environment:
      TZ: America/Guayaquil
      SERVER_PORT: 9090
      DB_URL: jdbc:postgresql://postgres:5432/sri_files_db
      DB_USER: postgres
      DB_PASS: postgres
      ERP_BACKEND_BASE_URL: http://192.168.0.165:9080
      EMAIL_MS_BASE_URL: http://emails:9099
    depends_on:
      - postgres
    networks:
      - epmapat-network

volumes:
  sri-postgres-data:

networks:
  epmapat-network:
    external: true
